<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Brain Tumor Classification System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* General Styles (Matching index.html) */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #eef7ff);
            overflow-x: hidden;
            color: #1e293b;
            transition: background 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            animation: fadeIn 1s ease-in-out;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1559757148-5c350d0d3c56?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80') no-repeat center center;
            background-size: cover;
            filter: blur(6px) opacity(0.25);
            z-index: -1;
            transition: all 0.5s ease-in-out;
        }
        /* Heading Styling */
        .main-heading {
            color: #1e40af;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-align: center;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15);
            animation: slideDown 0.6s ease;
        }
        /* Login Card (Matching index.html's card style) */
        .login-card {
            background: white;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.5s ease-out;
        }
        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        }
        .login-card h2 {
            color: #2563eb;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
        }
        /* Buttons (Matching index.html's gradient buttons) */
        .btn-gradient {
            background: linear-gradient(90deg, #2563eb, #1e40af);
            border: none;
            color: white;
            border-radius: 25px;
            padding: 10px 25px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }
        .btn-gradient:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        /* Animations (Matching index.html) */
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        /* Responsive (Matching index.html) */
        @media (max-width: 768px) {
            .login-card { padding: 20px; max-width: 90%; }
            .main-heading { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- Added heading -->
    <h1 class="main-heading">🧠 Brain Tumor Classification - AI System</h1>

    <div class="login-card">
        <h2>Login</h2>
        <form id="loginForm" method="POST" aria-labelledby="login-heading">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required aria-describedby="username-help">
                <div id="username-help" class="form-text">Enter your username.</div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required aria-describedby="password-help">
                <div id="password-help" class="form-text">Enter your password.</div>
            </div>
            <button type="submit" class="btn btn-gradient w-100" id="loginBtn">
                <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                Login
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Smooth form submission with debouncing and loading state
        const form = document.getElementById('loginForm');
        const btn = document.getElementById('loginBtn');
        const spinner = btn.querySelector('.spinner-border');

        // Debounce function to prevent rapid submissions
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        const debouncedSubmit = debounce(() => {
            spinner.classList.remove('d-none');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Logging in...';
        }, 300);

        form.addEventListener('submit', function(e) {
            debouncedSubmit();
        });
    </script>
</body>
</html>
